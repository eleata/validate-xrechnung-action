name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - name: verify dist is up to date
        run: |
          npx ncc build src/main.ts -o dist --source-map
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run: npm run build && commit"
            git diff dist
            exit 1
          fi
